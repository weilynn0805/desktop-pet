<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>桌面宠物 · 设置</title>
  <link rel="stylesheet" href="panel.css" />
</head>
<body>
  <header class="topbar">
    <h1>桌面宠物 · 设置</h1>
  </header>

  <main class="content">
    <!-- 形象与素材 -->
    <section class="card">
      <h2>形象与素材</h2>
      <p class="muted">选择/恢复宠物形象（后续接入）。</p>
    </section>

    <!-- 互动文案 -->
    <section class="card">
      <h2>互动文案</h2>
      <p class="muted">每行一句，宠物悬停时随机显示。留空则恢复默认文案。</p>
      <textarea id="phrases" class="textarea" rows="8" placeholder="一行一句…"></textarea>
      <div class="row">
        <button id="save-phrases" class="btn">保存</button>
        <span id="phrases-status" class="muted"></span>
      </div>
    </section>

    <!-- 行为 -->
    <section class="card">
      <h2>行为</h2>
      <p class="muted">开机自启、置顶、缩放等开关（后续接入）。</p>
    </section>

    <!-- 关于 -->
    <section class="card">
      <h2>关于</h2>
      <p class="muted" id="about">加载中…</p>
    </section>
  </main>

  <script src="panel.js"></script>
</body>
</html>
